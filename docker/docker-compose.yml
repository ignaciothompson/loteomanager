version: '3.8'

services:
  # PocketBase: Backend y Base de datos
  pocketbase:
    build:
      context: ../
      dockerfile: docker/pocketbase.Dockerfile
    container_name: loteo_pocketbase
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./pb_data:/pb_data
      # Migraciones y hooks desde el repo (sin esto hay que reconstruir la imagen tras cada cambio)
      - ../pb_migrations:/pb_migrations
      - ../pb_hooks:/pb_hooks
    networks:
      - loteo_network
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY}

  # Panel Admin (SPA estático sobre NGINX)
  admin-web:
    build:
      context: ../
      dockerfile: docker/admin.Dockerfile
    container_name: loteo_admin
    restart: unless-stopped
    networks:
      - loteo_network

  # Landing Page (Angular SSR con Node Express)
  landing-ssr:
    build:
      context: ../
      dockerfile: docker/landing.Dockerfile
    container_name: loteo_landing
    restart: unless-stopped
    networks:
      - loteo_network
    environment:
      - PORT=4000
      - POCKETBASE_URL=http://pocketbase:8080
      - PB_INTERNAL_URL=http://pocketbase:8080
      - PB_SERVICE_TOKEN=${PB_SERVICE_TOKEN}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - INMOBILIARIA_NOMBRE=${INMOBILIARIA_NOMBRE:-LoteoManager}

  # Cloudflare Tunnel: Expone los servicios de forma segura sin abrir puertos en el host
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: loteo_cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - loteo_network

networks:
  loteo_network:
    driver: bridge
