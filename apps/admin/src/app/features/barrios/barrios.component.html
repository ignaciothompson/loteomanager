<div class="default-height">
    <div class="card">
        <div class="barrios-filters">
            <div>
                <input
                    pInputText
                    type="text"
                    placeholder="Buscar por nombre…"
                    [value]="filtroNombre()"
                    (input)="filtroNombre.set($any($event.target).value)"
                />
            </div>
            <div class="barrios-filters__actions">
                @if (hasActiveFilters()) {
                    <button
                        pButton
                        type="button"
                        label="Limpiar"
                        icon="pi pi-filter-slash"
                        class="p-button-outlined p-button-secondary"
                        (click)="clearFilters()"
                    ></button>
                }
            </div>
        </div>
    </div>

    <div class="card">
        <p-toast />

        <div class="default-height__header flex justify-between items-center mb-4">
            <h5 class="m-0">Gestión de Barrios</h5>
            <button
                pButton
                type="button"
                icon="pi pi-plus"
                label="Nuevo barrio"
                class="p-button-success"
                (click)="openNew()"
            ></button>
        </div>

        <div class="default-height__scroll">
            <p-table
                [value]="barriosFiltrados()"
                [scrollable]="true"
                scrollHeight="flex"
                [rows]="10"
                [paginator]="true"
            >
                <ng-template pTemplate="header">
                    <tr>
                        <th>Nombre</th>
                        <th>Ubicación</th>
                        <th>Slug</th>
                        <th class="buttons-col"></th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-barrio>
                    <tr>
                        <td>{{ barrio.nombre }}</td>
                        <td>{{ barrio.ubicacion_texto || '—' }}</td>
                        <td>{{ barrio.slug }}</td>
                        <td class="buttons-col">
                            <button
                                pButton
                                type="button"
                                icon="pi pi-pencil"
                                class="p-button-secondary p-button-text mr-2"
                                [attr.aria-label]="'Editar'"
                                (click)="editBarrio(barrio)"
                            ></button>
                            <button
                                pButton
                                type="button"
                                icon="pi pi-trash"
                                class="p-button-danger p-button-text"
                                [attr.aria-label]="'Eliminar'"
                                (click)="deleteBarrio(barrio)"
                            ></button>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4">
                            @if (hasActiveFilters()) {
                                No hay barrios que coincidan con el filtro.
                            } @else {
                                No hay barrios cargados.
                            }
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>

<app-barrio-form-dialog
    [visible]="displayDialog()"
    (visibleChange)="displayDialog.set($event)"
    [isEdit]="isEdit()"
    [currentBarrio]="currentBarrio"
    [(extras)]="extrasModel"
    (save)="onBarrioFormSave($event)"
    (cancel)="displayDialog.set(false)"
/>
