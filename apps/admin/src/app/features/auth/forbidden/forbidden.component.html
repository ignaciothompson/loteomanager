<div class="flex align-items-center justify-content-center min-h-screen">
  <p-card styleClass="text-center shadow-4" [style]="{ width: '420px' }">
    <div class="flex flex-col align-items-center gap-4 py-4">
      <i class="pi pi-lock" style="font-size: 4rem; color: var(--red-400)"></i>
      <h1 class="text-2xl font-bold m-0">Sin permiso</h1>
      <p class="text-500 m-0">No tenés permisos para acceder a esta sección.</p>
      <p-button
        label="Volver al Dashboard"
        icon="pi pi-home"
        (click)="router.navigate(['/'])"
      />
    </div>
  </p-card>
</div>
