<div class="flex align-items-center justify-content-center min-h-screen">
  <div class="surface-card p-6 shadow-2 border-round w-full" style="max-width: 400px">
    <h2 class="text-center mb-4">Nueva contraseña</h2>
    @if (done()) {
      <p class="text-500 text-center">Tu contraseña fue actualizada correctamente.</p>
      <a routerLink="/login" class="p-button w-full mt-3 justify-content-center">
        Ir al login
      </a>
    } @else {
      <div class="flex flex-column gap-3">
        <p-password [(ngModel)]="password" placeholder="Nueva contraseña" [feedback]="true" class="w-full" />
        <p-password [(ngModel)]="confirm" placeholder="Confirmar contraseña" [feedback]="false" class="w-full" />
        @if (error()) {
          <p-message severity="error" [text]="error()!" />
        }
        <button pButton label="Cambiar contraseña" [loading]="loading()" (click)="resetear()" class="w-full"></button>
      </div>
    }
  </div>
</div>
