<div class="flex align-items-center justify-content-center min-h-screen">
  <div class="surface-card p-6 shadow-2 border-round w-full" style="max-width: 400px">
    <h2 class="text-center mb-4">Recuperar contraseña</h2>
    @if (sent()) {
      <p class="text-500 text-center">
        Si el email existe en el sistema, recibirás un enlace para restablecer tu contraseña.
      </p>
      <a routerLink="/login" class="p-button p-button-outlined w-full mt-3 justify-content-center">
        Volver al login
      </a>
    } @else {
      <div class="flex flex-column gap-3">
        <input pInputText type="email" [(ngModel)]="email" placeholder="Email" class="w-full" />
        @if (error()) {
          <p-message severity="error" [text]="error()!" />
        }
        <button pButton label="Enviar enlace" [loading]="loading()" (click)="enviar()" class="w-full"></button>
        <a routerLink="/login" class="text-center text-500 text-sm">Volver al login</a>
      </div>
    }
  </div>
</div>
