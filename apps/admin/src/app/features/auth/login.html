    <div class="bg-surface-50 dark:bg-surface-900 flex items-center justify-center min-h-screen min-w-[100vw] overflow-hidden">
      <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
          <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
            <div class="text-center mb-12">
              <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">¡Bienvenido a LoteoManager!</div>
              <span class="text-muted-color font-medium">Iniciá sesión para continuar</span>
            </div>

            <form (ngSubmit)="login()" #loginForm="ngForm">
              <div *ngIf="errorMsg()" class="mb-6">
                <p-message severity="error" [text]="errorMsg()"></p-message>
              </div>

              <div>
                <label for="email" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-4">Email</label>
                <input id="email" type="email" name="email" placeholder="Email" pInputText class="w-full md:w-[30rem] mb-12" [(ngModel)]="email" required />

                <label for="password" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-4">Contraseña</label>
                <p-password id="password" name="password" [(ngModel)]="password" placeholder="Contraseña" [toggleMask]="true" styleClass="mb-12" inputStyleClass="w-full p-3 md:w-[30rem]" [feedback]="false" required></p-password>

                <button pButton pRipple label="Ingresar" class="w-full p-4 text-xl" [loading]="loading()"></button>

                <div class="text-center mt-6">
                  <a routerLink="/auth/recuperar" class="text-primary text-sm cursor-pointer hover:underline">¿Olvidaste tu contraseña?</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
